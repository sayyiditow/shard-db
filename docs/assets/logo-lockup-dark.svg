<?xml version="1.0" encoding="UTF-8"?>
<!--
  shard-db logo lockup (dark theme — light wordmark on dark background).
  Companion to logo-lockup.svg; swap via <picture> + prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 360 96"
     shape-rendering="geometricPrecision">
  <g transform="translate(0,0)">
    <polygon
      points="48,12 80,30 80,66 48,84 16,66 16,30"
      fill="#58a6ff"/>
    <g stroke="#1f6feb" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
      <line x1="48" y1="12" x2="48" y2="84"/>
      <line x1="16" y1="30" x2="80" y2="66"/>
      <line x1="80" y1="30" x2="16" y2="66"/>
    </g>
  </g>
  <text
    x="100" y="64"
    font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
    font-size="44"
    font-weight="700"
    fill="#c9d1d9">shard-db</text>
</svg>
